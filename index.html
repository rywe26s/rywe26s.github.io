<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLXCKZ</title>
    <style>
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: 3.5em;
            font-weight: 900;
            letter-spacing: 15px;
            margin-bottom: 20px;
            margin-left: 15px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #F8D147;
            font-family: Arial, sans-serif;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        .action-button {
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            font-size: 1.1em;
            font-family: Arial, sans-serif;
            font-weight: 900;
            padding: 16px 40px;
            border-radius: 12px;
            text-transform: uppercase;
            transition: 0.2s;
            display: inline-block;
        }

        .action-button:hover {
            transform: scale(1.05);
            background-color: #e0e0e0;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            color: #444444;
            font-family: Arial, sans-serif;
            font-size: 0.8em;
            width: 100%;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2em;
                letter-spacing: 10px;
                margin-left: 10px;
            }

            .subtitle {
                font-size: 1em;
                margin-bottom: 40px;
            }

            .action-button {
                font-size: 0.9em;
                padding: 14px 20px;
                width: 90%;
                max-width: 320px;
                line-height: 1.4;
            }
        }
    </style>
</head>

<body>

    <h1>BLXCKZ</h1>

    <div class="subtitle">
        ИНДИ-ГОЛОВОЛОМКА
    </div>

    <a href="privacy.html" class="action-button">Политика<br>конфиденциальности</a>

</body>

</html>
